# ================================================================
# Media Stack — docker-compose.yml
# Follows: https://github.com/automation-avenue/arr-new
# ================================================================

volumes:
  digarr-pgdata:

x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment:
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: America/Los_Angeles
  dns:
    - 1.1.1.1
    - 1.0.0.1

networks:
  default:
    name: arr_network

services:

  ###############################################
  # FLARESOLVERR - Cloudflare Bypass Proxy
  ###############################################
  flaresolverr:
    <<: *common-keys
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      TZ: America/Los_Angeles
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
    ports:
      - "8191:8191"
    volumes:
      - /etc/localtime:/etc/localtime:ro

  ###############################################
  # PROWLARR - Indexer Manager
  ###############################################
  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/prowlarr:/config

  ###############################################
  # RADARR - Movies
  ###############################################
  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - "7878:7878"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/radarr:/config
      - /mnt/PLEX/data:/data
    depends_on:
      - prowlarr

  ###############################################
  # SONARR - TV Shows
  ###############################################
  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - "8989:8989"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/sonarr:/config
      - /mnt/PLEX/data:/data
    depends_on:
      - prowlarr

  ###############################################
  # LIDARR - Music
  ###############################################
  lidarr:
    <<: *common-keys
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    ports:
      - "8686:8686"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/lidarr:/config
      - /mnt/PLEX/data:/data
    depends_on:
      - prowlarr

  ###############################################
  # BAZARR - Subtitles
  ###############################################
  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - "6767:6767"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/bazarr:/config
      - /mnt/PLEX/data/media:/data/media
    depends_on:
      - radarr
      - sonarr

  ###############################################
  # SEERR - Request Management
  ###############################################
  seerr:
    <<: *common-keys
    container_name: seerr
    image: seerr/seerr:latest
    ports:
      - "5055:5055"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/seerr:/app/config

  ###############################################
  # AUTOBRR - Autodl / IRC Announce
  ###############################################
  autobrr:
    <<: *common-keys
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:latest
    ports:
      - "7474:7474"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/autobrr:/config

  ###############################################
  # SLSKD - Soulseek Client
  ###############################################
  slskd:
    <<: *common-keys
    container_name: slskd
    image: slskd/slskd:latest
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_SLSK_USERNAME: "${SLSKD_SLSK_USERNAME:?set in .env}"
      SLSKD_SLSK_PASSWORD: "${SLSKD_SLSK_PASSWORD:?set in .env}"
      SLSKD_SHARED_DIR: /data/media/music
    ports:
      - "5030:5030"    # Web UI
      - "50300:50300"  # Soulseek protocol
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/slskd:/app
      - /mnt/PLEX/data:/data

  ###############################################
  # SOULARR - Lidarr <-> slskd Bridge
  # Create /mnt/PLEX/Apps/Arrs/soularr/config.ini first
  # https://github.com/mrusse/soularr#configuration
  ###############################################
  soularr:
    <<: *common-keys
    container_name: soularr
    image: mrusse08/soularr:latest
    ports:
      - "8265:8265"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/soularr:/data
      - /mnt/PLEX/data/torrents/music:/data/torrents/music
    depends_on:
      - lidarr
      - slskd

  ###############################################
  # BGUTIL PO TOKEN PROVIDER - yt-dlp YouTube
  ###############################################
  bgutil-provider:
    <<: *common-keys
    container_name: bgutil-provider
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno@sha256:bea3cfda79245700d7ad90500052b4358b1c1828fdc0961929624b83933121bc
    expose:
      - "4416"
    volumes:
      - /etc/localtime:/etc/localtime:ro
  ###############################################
  # BEETS - Music Tagger / Importer
  ###############################################
  beets:
    <<: *common-keys
    container_name: beets
    # Updated from lscr.io/linuxserver/beets:latest on 2026-07-16.
    # linux/amd64 manifest digest verified with: docker manifest inspect --verbose lscr.io/linuxserver/beets:2.4.0
    platform: linux/amd64
    image: lscr.io/linuxserver/beets:2.4.0@sha256:4cce2967154e849ca5466469d934a4bb9d8d83c3acf2a5279da47bccd16518f1
    user: "${BEETS_UID:-1000}:${BEETS_GID:-1000}"
    entrypoint: ["/lsiopy/bin/python3"]
    command: ["/config/app.py"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=512m
      - /run:rw,nosuid,nodev,size=64m
    pids_limit: 512
    mem_limit: 2g
    cpus: "2.0"
    environment:
      PUID: ${BEETS_UID:-1000}
      PGID: ${BEETS_GID:-1000}
      UMASK: "0027"
      TZ: America/Los_Angeles
      BEETSDIR: /config
      HOME: /config
      XDG_CONFIG_HOME: /config/.config
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_BASE_URL: "${AI_BASE_URL:-}"
      AI_MODEL: "${AI_MODEL:-}"
      ACOUSTID_API_KEY: "${ACOUSTID_API_KEY:-}"
      ACOUSTID_KEY: "${ACOUSTID_KEY:-}"
      DISCOGS_TOKEN: "${DISCOGS_TOKEN:-}"
      DISCOGS_USER_TOKEN: "${DISCOGS_USER_TOKEN:-}"
      LISTENBRAINZ_TOKEN: "${LISTENBRAINZ_TOKEN:-}"
      PLEX_URL: http://192.168.0.250:32400
      PLEX_TOKEN: "${PLEX_TOKEN:?set in .env}"
      LIDARR_URL: http://192.168.0.250:8686
      LIDARR_API_KEY: "${LIDARR_API_KEY:?set in .env}"
      SPOTIFY_CLIENT_ID: ""
      SPOTIFY_CLIENT_SECRET: ""
      YTDLP_PO_PROVIDER_URL: http://bgutil-provider:4416
      YTDLP_BGUTIL_PIP_PACKAGE: bgutil-ytdlp-pot-provider==1.3.1
      YTDLP_INSTALL_DENO: "0"
      YTDLP_INSTALL_SYSTEM_JS_RUNTIME: "0"
      SPOTIFLAC_AUTO_INSTALL: "0"
      BEETS_OUTBOUND_ALLOWLIST: "192.168.0.250:32400,192.168.0.250:8686,bgutil-provider:4416,slskd:5030"
      BEETS_TRUSTED_PROXIES: ""
      BEETS_WEB_AUTH_TOKEN: "${BEETS_WEB_AUTH_TOKEN:?set a strong owner token}"
    ports:
      - "127.0.0.1:8337:8337"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Writable: app config, Beets DB/config, cache, job state, and explicit operator-managed backups.
      - /mnt/PLEX/Apps/Arrs/beets:/config:rw
      # Writable: Beets imports/moves/retags and controlled cleanup operate only inside the music library root.
      - /mnt/PLEX/data/media/music:/data/media/music:rw
      # Writable: playlist/download/intake staging. Do not replace this with /mnt/PLEX/data:/data.
      - /mnt/PLEX/data/torrents/music:/data/torrents/music:rw
    healthcheck:
      test: ["CMD", "/lsiopy/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8337/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      - bgutil-provider
  ###############################################
  # PROFILARR - Quality Profile & Custom Format Sync
  ###############################################
  profilarr:
    <<: *common-keys
    container_name: profilarr
    image: santiagosayshey/profilarr:latest
    ports:
      - "6868:6868"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/profilarr:/config

  ###############################################
  # CLEANUPARR - Stalled / Unmanaged Queue Cleaner
  ###############################################
  cleanuparr:
    <<: *common-keys
    container_name: cleanuparr
    image: ghcr.io/cleanuparr/cleanuparr:latest
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      PORT: "11011"
    ports:
      - "11011:11011"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/cleanuparr:/config

  ###############################################
  # ORGANIZR - Dashboard
  ###############################################
  organizr:
    <<: *common-keys
    container_name: organizr
    image: organizr/organizr:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
      branch: v2-master
    ports:
      - "8888:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/organizr:/config

  ###############################################
  # DIGARR - AI Music Discovery for Lidarr
  ###############################################
  digarr:
    <<: *common-keys
    container_name: digarr
    image: ghcr.io/iuliandita/digarr:1.0.0-rc.4
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: America/Los_Angeles
      PORT: "3000"
      DB_HOST: digarr-postgres
      DB_PORT: "5432"
      DB_USER: digarr
      DB_PASS: digarr
      DB_NAME: digarr
      DB_POOL_MAX: "10"
      DIGARR_INITIAL_USERNAME: admin
      DIGARR_INITIAL_PASSWORD: "${DIGARR_INITIAL_PASSWORD:?set in .env}"
      DIGARR_DISABLE_REGISTRATION: "true"
      ALLOWED_ORIGIN: "http://192.168.0.250:3000"
      LIDARR_URL: http://lidarr:8686
      LIDARR_API_KEY: "${LIDARR_API_KEY:?set in .env}"
      AI_PROVIDER: openai
      AI_MODEL: gpt-4o
      AI_API_KEY: "${AI_API_KEY:-}"
    ports:
      - "3000:3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/digarr:/app/backups
    depends_on:
      digarr-postgres:
        condition: service_healthy

  ###############################################
  # THELOUNGE - IRC Client
  ###############################################
  thelounge:
    <<: *common-keys
    container_name: thelounge
    image: ghcr.io/thelounge/thelounge:latest
    ports:
      - "9000:9000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /mnt/PLEX/Apps/Arrs/thelounge:/var/opt/thelounge

  ###############################################
  # DIGARR - PostgreSQL
  ###############################################
  digarr-postgres:
    <<: *common-keys
    container_name: digarr-postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: digarr
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set in .env}"
      POSTGRES_DB: digarr
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - digarr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digarr"]
      interval: 10s
      timeout: 5s
      retries: 5
