name: Question
description: Ask a usage or deployment question.
title: "question: "
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Do not include real credentials or private logs.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Deployment mode, Docker/host details, and relevant sanitized configuration.
