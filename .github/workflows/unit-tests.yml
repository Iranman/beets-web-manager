name: unit-tests

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m py_compile app.py helpers_mb.py job_engine.py routes_jobs.py scripts/security_secret_scan.py scripts/validate_compose_security.py scripts/verify_security_config.py
      - run: python -m unittest discover -s tests -p "test_*.py"
