name: security

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Secret scan
        run: python3 scripts/security_secret_scan.py

      - name: Python syntax and security regression tests
        run: |
          python3 -m py_compile app.py tests/test_security_hardening.py scripts/security_secret_scan.py
          python3 -m unittest discover -s tests -p "test_*.py"

      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
          npm run typecheck