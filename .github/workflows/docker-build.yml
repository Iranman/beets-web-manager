name: docker-build

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  compose-verification:
    runs-on: ubuntu-latest
    env:
      BEETS_WEB_AUTH_TOKEN: changeme
      OPENAI_API_KEY: changeme
      PLEX_TOKEN: changeme
      LIDARR_API_KEY: changeme
      SLSKD_SLSK_USERNAME: changeme
      SLSKD_SLSK_PASSWORD: changeme
      DIGARR_INITIAL_PASSWORD: changeme
      POSTGRES_PASSWORD: changeme
      AI_API_KEY: changeme
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python scripts/validate_compose_security.py
      - run: docker compose -f docker-compose.arrs.yml config
      - run: docker compose config
      - run: docker build --pull=false -t beets-web-manager:ci .
      - name: Installation smoke test
        run: |
          set -e
          mkdir -p /tmp/beets-ci-config /tmp/beets-ci-music /tmp/beets-ci-downloads
          # The image runs as uid 1000 (beets); these are ephemeral CI-only
          # scratch dirs, so make them world-writable rather than trying to
          # match uids between the runner and the container.
          chmod -R a+rwX /tmp/beets-ci-config /tmp/beets-ci-music /tmp/beets-ci-downloads
          cp config.yaml.example /tmp/beets-ci-config/config.yaml
          docker run -d --name beets-ci \
            -p 18337:8337 \
            -e BEETS_WEB_AUTH_TOKEN=ci-smoke-test-token-not-a-real-secret \
            -e WEBCONTROL_PORT=8337 \
            -v /tmp/beets-ci-config:/config \
            -v /tmp/beets-ci-music:/data/media/music \
            -v /tmp/beets-ci-downloads:/data/torrents \
            beets-web-manager:ci
          alive=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18337/health/live >/dev/null 2>&1; then
              echo "Container is alive after ${i}0s"
              alive=1
              break
            fi
            sleep 10
          done
          echo "--- /health/live ---"
          curl -fsS http://127.0.0.1:18337/health/live || true
          echo "--- /api/setup/status ---"
          curl -fsS -H "Authorization: Bearer ci-smoke-test-token-not-a-real-secret" \
            http://127.0.0.1:18337/api/setup/status || true
          echo "--- container logs (tail) ---"
          docker logs --tail 200 beets-ci || true
          docker stop beets-ci || true
          docker rm beets-ci || true
          if [ "$alive" -ne 1 ]; then
            echo "::error::Container never became healthy within the timeout"
            exit 1
          fi
